<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" font-family="Segoe UI, system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="880" height="240" rx="16" fill="#161616"/>
  <rect x="0.5" y="0.5" width="879" height="239" rx="16" fill="none" stroke="#2c2c2c"/>

  <!-- floor grid hint -->
  <g stroke="#232323" stroke-width="1">
    <line x1="40" y1="205" x2="320" y2="205"/>
    <line x1="40" y1="185" x2="320" y2="185"/>
    <line x1="80" y1="215" x2="80" y2="175"/>
    <line x1="160" y1="215" x2="160" y2="175"/>
    <line x1="240" y1="215" x2="240" y2="175"/>
  </g>

  <!-- arm -->
  <rect x="150" y="196" width="70" height="14" rx="4" fill="#333"/>
  <polyline points="185,196 185,132 244,96 300,72"
    fill="none" stroke="#c9cdd1" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="185" cy="196" r="10" fill="#3a5a8a"/>
  <circle cx="185" cy="132" r="10" fill="#3a5a8a"/>
  <circle cx="244" cy="96" r="10" fill="#3a5a8a"/>
  <!-- tcp target -->
  <circle cx="300" cy="72" r="13" fill="none" stroke="#ffaa00" stroke-width="3"/>
  <circle cx="300" cy="72" r="4" fill="#ffaa00"/>

  <!-- wordmark -->
  <text x="392" y="112" font-size="62" font-weight="800" fill="#f2f2f2" letter-spacing="0.5">OpenArm</text>
  <text x="394" y="150" font-size="22" fill="#9aa0a6">Offline robot programming, open source.</text>

  <!-- validated pill -->
  <g transform="translate(394,168)">
    <rect x="0" y="0" width="196" height="28" rx="14" fill="#1d2e22" stroke="#2f5a3f"/>
    <circle cx="17" cy="14" r="5" fill="#39d353"/>
    <text x="30" y="19" font-size="13" font-weight="600" fill="#bfe6c9">validated on URSim</text>
  </g>
</svg>
